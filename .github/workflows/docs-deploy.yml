name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'packages/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Build docs
        run: pnpm docs:build
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Verify build output
        run: |
          echo "=== Checking index.html ==="
          head -30 docs/.output/public/index.html
          echo ""
          echo "=== Checking _nuxt directory ==="
          ls -la docs/.output/public/_nuxt/ | head -10
          echo ""
          echo "=== Checking baseURL in HTML ==="
          grep -o 'baseURL:"[^"]*"' docs/.output/public/index.html || echo "baseURL not found in inline script"

      - name: Create version file
        run: |
          echo "{\"version\": \"$(date +%s)\"}" > docs/.output/public/version.json
          echo "Build timestamp: $(date)" >> docs/.output/public/version.txt

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: docs/.output/public
          clean: true
          clean-exclude: |
            .nojekyll
          commit-message: 'docs: deploy documentation'
          single-commit: true
          force: true
