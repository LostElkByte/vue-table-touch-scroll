name: Deploy Docs on Release

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Deploy Docs for Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Build docs
        run: pnpm docs:build
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: docs/.output/public
          clean: true
          commit-message: 'docs: deploy documentation for ${{ github.event.release.tag_name }}'
